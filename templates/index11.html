<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QRswoopAccess</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    /* HEADER */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .header img {
      width: 120px;
      margin-bottom: 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    /* FORM CARD */
    .form-card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2c5364;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    /* QR CARD (THIS IS WHAT WE EXPORT) */
    .qr-card {
      width: 320px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7b1fa2, #512da8);
      color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      text-align: center;
      display: none;
    }

    .qr-card img {
      width: 200px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .qr-title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .qr-meta {
      font-size: 13px;
      text-align: left;
      margin-top: 10px;
      line-height: 1.6;
    }

    .download-btn {
      margin-top: 15px;
      background: #ff9800;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" alt="QRswoopAccess Logo">
    <h1>QRswoopAccess</h1>
    <p>Smart Hotel QR Access System</p>
  </div>

  <!-- FORM -->
  <div class="form-card">

    <input id="room" placeholder="Room Number (e.g. 512)" />
    <input id="name" placeholder="Guest Name (e.g. Ahmed Alfahdi)" />
    <input id="guest_id" placeholder="Guest ID (e.g. A8392)" />

    <input id="checkin" type="datetime-local" />
    <input id="checkout" type="datetime-local" />

    <button onclick="generateQR()">Generate QR Card</button>

  </div>

  <!-- QR CARD (EXPORT AREA) -->
  <div id="qrCard" class="qr-card">

    <div class="qr-title">?? Hotel Access Card</div>

    <img id="qrImg"/>

    <div class="qr-meta" id="meta"></div>

  </div>

  <button class="download-btn" onclick="downloadPDF()">Download QR Card PDF</button>

</div>

<script>

let lastQRData = "";

function generateQR() {

    const payload = {
        room: document.getElementById("room").value,
        name: document.getElementById("name").value,
        guest_id: document.getElementById("guest_id").value,
        checkin: document.getElementById("checkin").value,
        checkout: document.getElementById("checkout").value
    };

    lastQRData = payload;

    // show QR from backend
    document.getElementById("qrImg").src =
        "/generate_qr?data=" + encodeURIComponent(JSON.stringify(payload));

    document.getElementById("meta").innerHTML = `
        <b>Room:</b> ${payload.room}<br>
        <b>Name:</b> ${payload.name}<br>
        <b>Guest ID:</b> ${payload.guest_id}<br>
        <b>Check-in:</b> ${payload.checkin}<br>
        <b>Check-out:</b> ${payload.checkout}
    `;

    document.getElementById("qrCard").style.display = "block";
}

async function downloadPDF() {

    const card = document.getElementById("qrCard");

    const canvas = await html2canvas(card);
    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const width = 180;
    const height = (canvas.height * width) / canvas.width;

    pdf.addImage(imgData, "PNG", 15, 20, width, height);
    pdf.save("QRswoopAccess-card.pdf");
}

</script>

</body>
</html>
