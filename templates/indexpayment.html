<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart QR Access System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  width: 100%;
  max-width: 950px;
  text-align: center;
}

/* HEADER */
.header img {
  width: 120px;
}

.header h1 {
  margin: 10px 0;
}

/* FORM */
.form-card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 14px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* BUTTONS */
button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

.pay-btn {
  background: #ff9800;
  color: white;
  width: 90%;
}

.gen-btn {
  background: #2c5364;
  color: white;
  width: 90%;
}

/* PAYMENT BOX */
.payment-box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  background: #fff;
  color: black;
  display: none;
}

.status {
  margin-top: 10px;
  font-weight: bold;
}

/* QR CARD */
.qr-card {
  width: 360px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(135deg, #7b1fa2, #512da8);
  display: none;
}

.qr-box img {
  width: 200px;
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img src="/static/logo.png">
  <h1>Smart QR Access System</h1>
</div>

<!-- FORM -->
<div class="form-card">

  <input id="room" placeholder="Room Number">
  <input id="name" placeholder="Guest Name">
  <input id="guest_id" placeholder="Guest ID">
  <input id="checkin" type="datetime-local">
  <input id="checkout" type="datetime-local">

  <button class="pay-btn" onclick="payNow()">💳 Pay for Booking</button>

  <div class="payment-box" id="paymentBox">
    <p>Payment Required: <b>$25.00</b></p>
    <button onclick="confirmPayment()">Confirm Payment</button>
  </div>

  <div class="status" id="status"></div>

  <button class="gen-btn" onclick="generateQR()" id="genBtn" disabled>
    Generate QR Card
  </button>

</div>

<!-- QR -->
<div id="qrCard" class="qr-card">

  <div class="qr-box">
    <img id="qrImg">
  </div>

  <p>Room <span id="roomText"></span></p>

</div>

</div>

<script>

let paid = false;

/* =========================
   PAYMENT FLOW
========================= */
function payNow() {
  document.getElementById("paymentBox").style.display = "block";
  document.getElementById("status").innerText = "Payment pending...";
}

function confirmPayment() {

  // simulate payment success
  paid = true;

  document.getElementById("status").innerText = "Payment successful ✔";
  document.getElementById("paymentBox").style.display = "none";
  document.getElementById("genBtn").disabled = false;
}

/* =========================
   GENERATE QR (ONLY AFTER PAYMENT)
========================= */
function generateQR() {

  if (!paid) {
    alert("Please complete payment first!");
    return;
  }

  const payload = {
    room: document.getElementById("room").value,
    name: document.getElementById("name").value,
    guest_id: document.getElementById("guest_id").value,
    checkin: document.getElementById("checkin").value,
    checkout: document.getElementById("checkout").value
  };

  qrImg.src =
    "/generate_qr?data=" + encodeURIComponent(JSON.stringify(payload));

  roomText.innerText = payload.room;
  document.getElementById("qrCard").style.display = "block";
}

</script>

</body>
</html>
