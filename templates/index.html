<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QRswoopAccess</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  max-width: 900px;
  text-align: center;
}

/* HEADER */
.header img {
  width: 110px;
}

/* FORM */
.form-card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 14px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 6px 0;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  background: #2c5364;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

/* CARD */
.qr-card {
  width: 360px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(135deg, #7b1fa2, #512da8);
  display: none;

  box-shadow:
    0 25px 60px rgba(0,0,0,0.6),
    inset 0 2px 10px rgba(255,255,255,0.2);
}

/* QR AREA */
.qr-area {
  position: relative;
  width: 220px;
  margin: 0 auto;
}

/* QR FRAME */
.qr-frame {
  background: linear-gradient(145deg, #ffffff, #dcdcdc);
  padding: 10px;
  border-radius: 16px;

  box-shadow:
    inset 0 3px 6px rgba(0,0,0,0.25),
    inset 0 -3px 6px rgba(255,255,255,0.9),
    0 12px 20px rgba(0,0,0,0.4);
}

.qr-frame img {
  width: 100%;
  display: block;
}

/* ?? ADJOINT LOGO (TOUCHING EDGE, NO OVERLAP) */
.logo-overlay {
  position: absolute;
  top: 0;                       /* anchor to top edge */
  left: 50%;
  transform: translate(-50%, -50%); /* move up half height */

  background: linear-gradient(145deg, #ffffff, #e0e0e0);
  padding: 6px;
  border-radius: 14px;

  z-index: 10;

  box-shadow:
    0 8px 16px rgba(0,0,0,0.4),
    inset 0 2px 6px rgba(255,255,255,0.9),
    inset 0 -2px 4px rgba(0,0,0,0.2);
}

.logo-overlay img {
  width: 60px;
  display: block;
}

/* ROOM */
.room-text {
  margin-top: 35px;
  font-size: 26px;
  font-weight: bold;
}

/* DOWNLOAD */
.download-btn {
  background: #ff9800;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <img id="logoImg">
  <h1>QRswoopAccess</h1>
</div>

<div class="form-card">
  <input id="room" placeholder="Room Number"/>
  <input id="name" placeholder="Guest Name"/>
  <input id="guest_id" placeholder="Guest ID"/>
  <input id="checkin" type="datetime-local"/>
  <input id="checkout" type="datetime-local"/>

  <button onclick="generateQR()">Generate QR Card</button>
</div>

<div id="qrCard" class="qr-card">

  <div class="qr-area">

    <div class="qr-frame">
      <img id="qrImg">
    </div>

    <!-- ? ADJOINT LOGO -->
    <div class="logo-overlay">
      <img id="cardLogo">
    </div>

  </div>

  <div class="room-text">
    Room <span id="roomText"></span>
  </div>

</div>

<button class="download-btn" onclick="downloadPDF()">Download PDF</button>

</div>

<script>

const logoPath = "/static/logo.png";

logoImg.src = logoPath;
cardLogo.src = logoPath;

function generateQR() {

  const payload = {
    room: room.value,
    name: name.value,
    guest_id: guest_id.value,
    checkin: checkin.value,
    checkout: checkout.value
  };

  qrImg.src = "/generate_qr?data=" + encodeURIComponent(JSON.stringify(payload));
  roomText.innerText = payload.room;

  qrCard.style.display = "block";
}

async function downloadPDF() {

  const card = document.getElementById("qrCard");

  const canvas = await html2canvas(card, { scale: 2 });
  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  pdf.addImage(imgData, "PNG", 15, 20, 180, 180);
  pdf.save("QRswoopAccess-card.pdf");
}

</script>

</body>
</html>
