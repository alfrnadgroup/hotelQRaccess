<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart QR Access System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  width: 100%;
  max-width: 950px;
  text-align: center;
}

.header {
  margin-bottom: 20px;
}

.header img {
  width: 120px;
  margin-bottom: 10px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.form-card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 14px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  background: #2c5364;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

.qr-card {
  width: 360px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(135deg, #7b1fa2, #512da8);
  display: none;
}

.qr-stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.logo-box, .qr-box {
  background: white;
  padding: 10px;
  border-radius: 14px;
}

.logo-box img { width: 60px; }
.qr-box img { width: 200px; }

.room-text {
  margin-top: 20px;
  font-size: 24px;
}

.download-btn {
  background: #ff9800;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <!-- FIXED LOGO PATH -->
  <img src="/static/logo.png" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
  <h1>Smart QR Access System</h1>
</div>

<div class="form-card">
  <input id="room" placeholder="Room Number" />
  <input id="name" placeholder="Guest Name" />
  <input id="guest_id" placeholder="Guest ID" />
  <input id="checkin" type="datetime-local" />
  <input id="checkout" type="datetime-local" />

  <button onclick="generateQR()">Generate QR Card</button>
</div>

<div id="qrCard" class="qr-card">

  <div class="qr-stack">

    <div class="logo-box">
      <img id="cardLogo">
    </div>

    <div class="qr-box">
      <img id="qrImg">
    </div>

  </div>

  <div class="room-text">
    Room <span id="roomText"></span>
  </div>

</div>

<button class="download-btn" onclick="downloadPDF()">Download PDF</button>

</div>

<script>

const BACKEND = "https://realaccess.onrender.com";

/* =========================
   SAFE LOGO LOAD
========================= */
const logoPath = "/static/logo.png";
const cardLogo = document.getElementById("cardLogo");

cardLogo.src = logoPath;
cardLogo.onerror = () => {
  cardLogo.src = "https://via.placeholder.com/60?text=LOGO";
};

/* =========================
   CONNECTED QR GENERATION
========================= */
async function generateQR() {

  const payload = {
    room: document.getElementById("room").value,
    name: document.getElementById("name").value,
    guest_id: document.getElementById("guest_id").value,
    checkin: document.getElementById("checkin").value,
    checkout: document.getElementById("checkout").value
  };

  try {

    const res = await fetch(BACKEND + "/api/checkin", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!data.qr_token) {
      alert("Failed to generate QR");
      console.log(data);
      return;
    }

    document.getElementById("qrImg").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
      encodeURIComponent(data.qr_token);

    document.getElementById("roomText").innerText = payload.room;
    document.getElementById("qrCard").style.display = "block";

  } catch (err) {
    console.error(err);
    alert("Backend connection failed");
  }
}

/* =========================
   PDF DOWNLOAD
========================= */
async function downloadPDF() {

  const card = document.getElementById("qrCard");

  const canvas = await html2canvas(card, { scale: 2 });
  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  pdf.addImage(imgData, "PNG", 15, 20, 180, 180);
  pdf.save("SmartQRAccess.pdf");
}

</script>

</body>
</html>
