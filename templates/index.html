<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QRswoopAccess</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  max-width: 900px;
  text-align: center;
}

/* HEADER */
.header img {
  width: 110px;
}

.form-card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 14px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 6px 0;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  background: #2c5364;
  color: white;
  border: none;
  margin-top: 10px;
}

/* OUTER CARD */
.qr-card {
  width: 360px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(135deg, #7b1fa2, #512da8);
  display: none;

  box-shadow:
    0 25px 60px rgba(0,0,0,0.6),
    inset 0 2px 10px rgba(255,255,255,0.2);
}

/* MAIN BLOCK */
.qr-combined {
  background: linear-gradient(145deg, #ffffff, #e0e0e0);
  padding: 25px;
  border-radius: 22px;

  transform: perspective(1000px) rotateX(8deg);

  box-shadow:
    0 30px 50px rgba(0,0,0,0.5),
    inset 0 5px 15px rgba(255,255,255,0.9),
    inset 0 -5px 12px rgba(0,0,0,0.2);
}

/* ?? LOGO 3D FRAME */
.logo-frame {
  background: linear-gradient(145deg, #ffffff, #dcdcdc);
  padding: 10px;
  border-radius: 16px;
  margin-bottom: 15px;

  box-shadow:
    inset 0 3px 6px rgba(0,0,0,0.2),
    inset 0 -3px 6px rgba(255,255,255,0.9),
    0 8px 15px rgba(0,0,0,0.4);
}

.logo-frame img {
  width: 70px;
  display: block;
  margin: auto;
}

/* ?? QR 3D FRAME */
.qr-frame {
  background: linear-gradient(145deg, #ffffff, #dcdcdc);
  padding: 12px;
  border-radius: 18px;

  box-shadow:
    inset 0 4px 10px rgba(0,0,0,0.25),
    inset 0 -4px 10px rgba(255,255,255,0.9),
    0 15px 25px rgba(0,0,0,0.5);
}

.qr-frame img {
  width: 200px;
  display: block;
}

/* ROOM */
.room-text {
  margin-top: 20px;
  font-size: 26px;
  font-weight: bold;
}

.download-btn {
  background: #ff9800;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <img id="logoImg">
  <h1>QRswoopAccess</h1>
</div>

<div class="form-card">
  <input id="room" placeholder="Room Number"/>
  <input id="name" placeholder="Guest Name"/>
  <input id="guest_id" placeholder="Guest ID"/>
  <input id="checkin" type="datetime-local"/>
  <input id="checkout" type="datetime-local"/>
  <button onclick="generateQR()">Generate</button>
</div>

<div id="qrCard" class="qr-card">

  <div class="qr-combined">

    <!-- ?? LOGO WITH INNER 3D -->
    <div class="logo-frame">
      <img id="cardLogo">
    </div>

    <!-- ?? QR WITH INNER 3D -->
    <div class="qr-frame">
      <img id="qrImg">
    </div>

  </div>

  <div class="room-text">
    Room <span id="roomText"></span>
  </div>

</div>

<button class="download-btn" onclick="downloadPDF()">Download PDF</button>

</div>

<script>

const logoPath = "/static/logo.png";

logoImg.src = logoPath;
cardLogo.src = logoPath;

function generateQR() {

  const payload = {
    room: room.value,
    name: name.value,
    guest_id: guest_id.value,
    checkin: checkin.value,
    checkout: checkout.value
  };

  qrImg.src = "/generate_qr?data=" + encodeURIComponent(JSON.stringify(payload));
  roomText.innerText = payload.room;

  qrCard.style.display = "block";
}

async function downloadPDF() {

  const card = document.getElementById("qrCard");

  const canvas = await html2canvas(card, {scale:2});
  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  pdf.addImage(imgData, "PNG", 15, 20, 180, 180);
  pdf.save("QRswoopAccess-card.pdf");
}

</script>

</body>
</html>
