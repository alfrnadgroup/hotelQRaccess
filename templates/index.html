<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QRswoopAccess</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    /* HEADER */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .header img {
      width: 110px;
      margin-bottom: 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    /* FORM */
    .form-card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 14px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2c5364;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    /* QR CARD */
    .qr-card {
      width: 340px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7b1fa2, #512da8);
      display: none;
      text-align: center;
    }

    .qr-card img {
      width: 180px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .qr-meta {
      text-align: left;
      font-size: 13px;
      margin-top: 10px;
      line-height: 1.5;
    }

    .download-btn {
      background: #ff9800;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <!-- LOGO (PAGE) -->
    <img id="logoImg" alt="QRswoopAccess Logo">

    <h1>QRswoopAccess</h1>
    <p>Smart Hotel QR Access System</p>
  </div>

  <!-- FORM -->
  <div class="form-card">

    <input id="room" placeholder="Room Number (e.g. 512)" />
    <input id="name" placeholder="Guest Name (e.g. Ahmed Alfahdi)" />
    <input id="guest_id" placeholder="Guest ID (e.g. A8392)" />
    <input id="checkin" type="datetime-local" />
    <input id="checkout" type="datetime-local" />

    <button onclick="generateQR()">Generate QR Card</button>

  </div>

  <!-- QR CARD -->
  <div id="qrCard" class="qr-card">

    <!-- LOGO INSIDE CARD (IMPORTANT FOR PDF) -->
    <img id="cardLogo" style="width:70px; margin-bottom:10px;" />

    <h3>?? Hotel Access Card</h3>

    <img id="qrImg"/>

    <div class="qr-meta" id="meta"></div>

  </div>

  <button class="download-btn" onclick="downloadPDF()">Download QR Card PDF</button>

</div>

<script>

let logoPath = "/static/logo.png";

/* ? FIX: use real static file (NOT base64) */
document.getElementById("logoImg").src = logoPath;
document.getElementById("cardLogo").src = logoPath;

function generateQR() {

    const payload = {
        room: room.value,
        name: name.value,
        guest_id: guest_id.value,
        checkin: checkin.value,
        checkout: checkout.value
    };

    qrImg.src = "/generate_qr?data=" + encodeURIComponent(JSON.stringify(payload));

    meta.innerHTML = `
        <b>Room:</b> ${payload.room}<br>
        <b>Name:</b> ${payload.name}<br>
        <b>Guest ID:</b> ${payload.guest_id}<br>
        <b>Check-in:</b> ${payload.checkin}<br>
        <b>Check-out:</b> ${payload.checkout}
    `;

    qrCard.style.display = "block";
}

async function downloadPDF() {

    const card = document.getElementById("qrCard");

    /* ? WAIT FOR IMAGES TO LOAD (fix PDF missing logo) */
    const images = card.getElementsByTagName("img");

    await Promise.all([...images].map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
            img.onload = img.onerror = resolve;
        });
    }));

    const canvas = await html2canvas(card, {
        useCORS: true,
        allowTaint: false
    });

    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    pdf.addImage(imgData, "PNG", 15, 20, 180, 180);
    pdf.save("QRswoopAccess-card.pdf");
}

</script>

</body>
</html>
