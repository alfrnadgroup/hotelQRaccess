<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QRswoopAccess</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  max-width: 900px;
  text-align: center;
}

/* HEADER */
.header img {
  width: 110px;
  margin-bottom: 10px;
}

.header h1 {
  margin: 0;
}

/* FORM */
.form-card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 14px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 6px 0;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  background: #2c5364;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

/* CARD */
.qr-card {
  width: 360px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(135deg, #7b1fa2, #512da8);
  display: none;

  box-shadow:
    0 25px 60px rgba(0,0,0,0.6),
    inset 0 2px 10px rgba(255,255,255,0.2);
}

/* QR AREA (CENTERED) */
.qr-area {
  position: relative;
  width: 220px;
  margin: 0 auto;
}

/* QR FRAME */
.qr-frame {
  background: linear-gradient(145deg, #ffffff, #dcdcdc);
  padding: 10px;
  border-radius: 16px;

  box-shadow:
    inset 0 3px 6px rgba(0,0,0,0.25),
    inset 0 -3px 6px rgba(255,255,255,0.9),
    0 12px 20px rgba(0,0,0,0.4);
}

.qr-frame img {
  width: 100%;
  display: block;
}

/* ?? LOGO OVERLAY (FIXED POSITION) */
.logo-overlay {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;

  background: linear-gradient(145deg, #ffffff, #e0e0e0);
  padding: 6px;
  border-radius: 14px;

  box-shadow:
    0 10px 20px rgba(0,0,0,0.4),
    inset 0 2px 6px rgba(255,255,255,0.9),
    inset 0 -2px 4px rgba(0,0,0,0.2);
}

.logo-overlay img {
  width: 60px;
  display: block;
}

/* ROOM TEXT */
.room-text {
  margin-top: 35px;
  font-size: 26px;
  font-weight: bold;
}

/* DOWNLOAD */
.download-btn {
  background: #ff9800;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img id="logoImg">
  <h1>QRswoopAccess</h1>
  <p>Smart Hotel QR Access System</p>
</div>

<!-- FORM -->
<div class="form-card">
  <input id="room" placeholder="Room Number (e.g. 512)" />
  <input id="name" placeholder="Guest Name" />
  <input id="guest_id" placeholder="Guest ID" />
  <input id="checkin" type="datetime-local" />
  <input id="checkout" type="datetime-local" />

  <button onclick="generateQR()">Generate QR Card</button>
</div>

<!-- QR CARD -->
<div id="qrCard" class="qr-card">

  <div class="qr-area">

    <!-- QR -->
    <div class="qr-frame">
      <img id="qrImg">
    </div>

    <!-- LOGO OVERLAY -->
    <div class="logo-overlay">
      <img id="cardLogo">
    </div>

  </div>

  <!-- ONLY ROOM -->
  <div class="room-text">
    Room <span id="roomText"></span>
  </div>

</div>

<button class="download-btn" onclick="downloadPDF()">Download QR Card PDF</button>

</div>

<script>

const logoPath = "/static/logo.png";

/* LOAD LOGOS */
document.getElementById("logoImg").src = logoPath;
document.getElementById("cardLogo").src = logoPath;

function generateQR() {

  const payload = {
    room: room.value,
    name: name.value,
    guest_id: guest_id.value,
    checkin: checkin.value,
    checkout: checkout.value
  };

  qrImg.src = "/generate_qr?data=" + encodeURIComponent(JSON.stringify(payload));
  roomText.innerText = payload.room;

  qrCard.style.display = "block";
}

async function downloadPDF() {

  const card = document.getElementById("qrCard");

  const images = card.getElementsByTagName("img");

  await Promise.all([...images].map(img => {
    if (img.complete) return;
    return new Promise(resolve => {
      img.onload = img.onerror = resolve;
    });
  }));

  const canvas = await html2canvas(card, { scale: 2 });
  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "mm", "a4");

  pdf.addImage(imgData, "PNG", 15, 20, 180, 180);
  pdf.save("QRswoopAccess-card.pdf");
}

</script>

</body>
</html>
