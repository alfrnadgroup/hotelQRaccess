<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QRswoopAccess</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    /* HEADER */
    .header img {
      width: 110px;
      margin-bottom: 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    /* FORM */
    .form-card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 14px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2c5364;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    /* QR CARD */
    .qr-card {
      width: 360px;
      margin: 40px auto;
      padding: 25px;
      border-radius: 20px;
      background: linear-gradient(135deg, #7b1fa2, #512da8);
      display: none;
      text-align: center;

      box-shadow:
        0 25px 60px rgba(0,0,0,0.6),
        inset 0 2px 10px rgba(255,255,255,0.2);
    }

    /* ?? REAL 3D BLOCK */
    .qr-combined {
      background: linear-gradient(145deg, #ffffff, #e6e6e6);
      padding: 25px 20px;
      border-radius: 22px;

      display: inline-block;

      transform: perspective(1000px) rotateX(8deg) rotateY(-3deg);

      box-shadow:
        0 30px 50px rgba(0,0,0,0.5),
        inset 0 4px 12px rgba(255,255,255,0.9),
        inset 0 -4px 10px rgba(0,0,0,0.15);
    }

    /* LOGO */
    .qr-logo {
      width: 75px;
      display: block;
      margin: 0 auto 15px;

      transform: translateZ(40px);

      filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.4));
    }

    /* QR */
    .qr-image {
      width: 200px;
      display: block;

      transform: translateZ(20px);

      filter: drop-shadow(0px 15px 15px rgba(0,0,0,0.4));
    }

    /* ROOM */
    .room-text {
      margin-top: 20px;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .download-btn {
      background: #ff9800;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <img id="logoImg">
    <h1>QRswoopAccess</h1>
    <p>Smart Hotel QR Access System</p>
  </div>

  <!-- FORM -->
  <div class="form-card">

    <input id="room" placeholder="Room Number (e.g. 512)" />
    <input id="name" placeholder="Guest Name" />
    <input id="guest_id" placeholder="Guest ID" />
    <input id="checkin" type="datetime-local" />
    <input id="checkout" type="datetime-local" />

    <button onclick="generateQR()">Generate QR Card</button>

  </div>

  <!-- QR CARD -->
  <div id="qrCard" class="qr-card">

    <div class="qr-combined">
      <img id="cardLogo" class="qr-logo">
      <img id="qrImg" class="qr-image">
    </div>

    <div class="room-text">
      Room <span id="roomText"></span>
    </div>

  </div>

  <button class="download-btn" onclick="downloadPDF()">Download QR Card PDF</button>

</div>

<script>

const logoPath = "/static/logo.png";

document.getElementById("logoImg").src = logoPath;
document.getElementById("cardLogo").src = logoPath;

function generateQR() {

    const payload = {
        room: room.value,
        name: name.value,
        guest_id: guest_id.value,
        checkin: checkin.value,
        checkout: checkout.value
    };

    qrImg.src = "/generate_qr?data=" + encodeURIComponent(JSON.stringify(payload));

    roomText.innerText = payload.room;

    qrCard.style.display = "block";
}

async function downloadPDF() {

    const card = document.getElementById("qrCard");

    const images = card.getElementsByTagName("img");

    await Promise.all([...images].map(img => {
        if (img.complete) return;
        return new Promise(resolve => {
            img.onload = img.onerror = resolve;
        });
    }));

    const canvas = await html2canvas(card, {
        useCORS: true,
        scale: 2
    });

    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    pdf.addImage(imgData, "PNG", 15, 20, 180, 180);
    pdf.save("QRswoopAccess-card.pdf");
}

</script>

</body>
</html>
