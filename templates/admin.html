<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

#reader {
  width: 320px;
  margin: auto;
}

.result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  font-size: 20px;
}

.ok { background: green; }
.bad { background: red; }
</style>
</head>

<body>

<h2>🔐 QR Scanner</h2>

<div id="reader"></div>

<div id="result" class="result" style="display:none;"></div>

<script>

const resultBox = document.getElementById("result");

function onScanSuccess(decodedText) {

  fetch("/verify", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ token: decodedText })
  })
  .then(r => r.json())
  .then(data => {

    resultBox.style.display = "block";

    if (data.valid) {
      resultBox.className = "result ok";
      resultBox.innerHTML = "✅ GRANTED<br>Room: " + data.data.room;
    } else {
      resultBox.className = "result bad";
      resultBox.innerHTML = "❌ DENIED";
    }

  });

}

const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
});

scanner.render(onScanSuccess);

</script>

</body>
</html>
