<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

/* =========================
   FULL PAGE LAYOUT FIX
========================= */
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

/* =========================
   LOGIN FULL SCREEN
========================= */
.login-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-card {
  background: white;
  color: black;
  padding: 30px;
  border-radius: 15px;
  width: 340px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.login-card img {
  width: 90px;
  margin-bottom: 10px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #7b1fa2, #512da8);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* =========================
   SCANNER FULL SCREEN
========================= */
#scannerPanel {
  display: none;
  height: 100vh;
  padding-top: 30px;
  text-align: center;
}

/* HEADER */
.header img {
  width: 90px;
}

.header h2 {
  margin: 10px 0 20px;
}

/* SCANNER BOX CENTERED ONLY */
.scanner-box {
  width: 100%;
  display: flex;
  justify-content: center;
}

/* QR SCANNER */
#reader {
  width: 380px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* RESULT */
.result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  font-size: 20px;
  width: 300px;
  margin-left: auto;
  margin-right: auto;
}

.ok {
  background: linear-gradient(135deg, #00c853, #64dd17);
}

.bad {
  background: linear-gradient(135deg, #d50000, #ff1744);
}

</style>
</head>

<body>

<!-- =========================
     LOGIN PAGE (FULL SCREEN)
========================= -->
<div class="login-screen" id="loginBox">

  <div class="login-card">

    <img src="/static/logo.png" onerror="this.src='https://via.placeholder.com/90?text=LOGO'">

    <h3>Admin Login</h3>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

  </div>

</div>

<!-- =========================
     SCANNER PAGE (FULL SCREEN)
========================= -->
<div id="scannerPanel">

  <div class="header">
    <img src="/static/logo.png" onerror="this.src='https://via.placeholder.com/90'">
    <h2>QR Scanner</h2>
  </div>

  <div class="scanner-box">
    <div id="reader"></div>
  </div>

  <div id="result" class="result" style="display:none;"></div>

</div>

<script>

const resultBox = document.getElementById("result");

/* =========================
   LOGIN
========================= */
function login() {

  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === "Bashq" && p === "5424") {

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("scannerPanel").style.display = "block";

    startScanner();

  } else {
    alert("Invalid credentials");
  }
}

/* =========================
   SCANNER START
========================= */
function startScanner() {

  const scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scanner.render(onScanSuccess);
}

/* =========================
   VERIFY
========================= */
function onScanSuccess(decodedText) {

  fetch("/verify", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ token: decodedText })
  })
  .then(r => r.json())
  .then(data => {

    resultBox.style.display = "block";

    if (data.valid) {
      resultBox.className = "result ok";
      resultBox.innerHTML = "✅ GRANTED<br>Room: " + data.data.room;
    } else {
      resultBox.className = "result bad";
      resultBox.innerHTML = "❌ DENIED";
    }

  });

}

</script>

</body>
</html>
